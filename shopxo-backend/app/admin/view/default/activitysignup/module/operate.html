{{if AdminIsPower('activitysignup', 'detail')}}
    <button type="button" class="am-btn am-btn-default am-btn-xs am-radius am-btn-block submit-popup" data-url="{{:MyUrl('admin/activitysignup/detail', ['id'=>$module_data['id']])}}" data-title="{{:MyLang('detail_title')}}" data-offcanvas="right">
        <i class="am-icon-eye"></i>
        <span>{{:MyLang('detail_title')}}</span>
    </button>
{{/if}}
{{if AdminIsPower('activitysignup', 'checkin')}}
    {{if empty($module_data['checkin_status']) or $module_data['checkin_status'] eq 0}}
        <button type="button" class="am-btn am-btn-success am-btn-xs am-radius am-btn-block submit-ajax" data-url="{{:MyUrl('admin/activitysignup/checkin')}}" data-id="{{$module_data.id}}" data-key="id" data-msg="确认签到？">
            <i class="am-icon-check"></i>
            <span>签到</span>
        </button>
    {{/if}}
{{/if}}
