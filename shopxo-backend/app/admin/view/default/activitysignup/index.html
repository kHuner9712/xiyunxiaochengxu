<!-- 继承公共的 form -->
{{extend name="../../../module/view/form_table/form" /}}

<!-- 表单顶部操作栏 -->
{{block name="form_operate_top"}}
    {{if AdminIsPower('activitysignup', 'export')}}
        <button type="button" class="am-btn am-btn-success am-radius am-btn-xs export-csv-btn">
            <i class="am-icon-download"></i>
            <span>导出</span>
        </button>
    {{/if}}

    <!-- [MUYING-二开] 批量确认报名按钮 — 获取勾选的报名记录，二次确认后批量确认 -->
    {{if AdminIsPower('activitysignup', 'batchconfirm')}}
        <button type="button" class="am-btn am-btn-primary am-radius am-btn-xs batch-confirm-btn">
            <i class="am-icon-check-circle-o"></i>
            <span>批量确认</span>
        </button>
    {{/if}}

    {__block__}
{{/block}}

<!-- 底部扩展 -->
{{block name="form_page_bottom"}}
<script type="text/javascript">
$(function(){
    // [MUYING-二开] 导出 CSV
    $('.export-csv-btn').on('click', function(){
        var params = $('form.form-validation-search').serialize();
        window.location.href = "{{:MyUrl('admin/activitysignup/export')}}" + (params ? '&' + params : '');
    });

    // [MUYING-二开] 批量确认报名
    $('.batch-confirm-btn').on('click', function(){
        var values = FromTableCheckedValues('id', '.am-table-scrollable-horizontal');
        if (values.length <= 0) {
            Prompt('请先勾选要确认的报名记录');
            return false;
        }
        AMUI.dialog.confirm({
            title: '批量确认报名',
            content: '确认将选中的 ' + values.length + ' 条待确认报名批量确认为已确认？此操作不可撤销。',
            onConfirm: function() {
                $.ajax({
                    url: RequestUrlHandle("{{:MyUrl('admin/activitysignup/batchconfirm')}}"),
                    type: 'POST',
                    dataType: 'json',
                    data: {ids: values},
                    success: function(result) {
                        if (result.code == 0) {
                            Prompt(result.msg, 'success');
                            setTimeout(function(){ window.location.reload(); }, 1200);
                        } else {
                            Prompt(result.msg || '操作失败', 'danger');
                        }
                    },
                    error: function() {
                        Prompt('网络异常，请稍后重试', 'danger');
                    }
                });
            },
            onCancel: function() {}
        });
    });
});
</script>
{{/block}}
