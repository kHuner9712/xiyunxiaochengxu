<!-- 继承公共的 form -->
{{extend name="../../../module/view/form_table/form" /}}

<!-- 表单顶部操作栏 -->
{{block name="form_operate_top"}}
    {{if AdminIsPower('activitysignup', 'export')}}
        <button type="button" class="am-btn am-btn-success am-radius am-btn-xs export-csv-btn">
            <i class="am-icon-download"></i>
            <span>导出</span>
        </button>
    {{/if}}

    {__block__}
{{/block}}

<!-- 底部扩展 -->
{{block name="form_page_bottom"}}
<script type="text/javascript">
$(function(){
    $('.export-csv-btn').on('click', function(){
        var params = $('form.form-validation-search').serialize();
        window.location.href = "{{:MyUrl('admin/activitysignup/export')}}" + (params ? '&' + params : '');
    });
});
</script>
{{/block}}
