bind 0.0.0.0
protected-mode yes
port 6379
timeout 300
tcp-keepalive 60
daemonize no
pidfile /var/run/redis.pid
loglevel notice

requirepass ${REDIS_PASSWORD:-}

maxmemory 256mb
maxmemory-policy allkeys-lru

save 900 1
save 300 10
save 60 10000

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

databases 16
