# ============================================================
# 孕禧小程序 — Nginx 生产环境配置示例（宝塔适配版）
# ============================================================
#
# 【用法】
#   宝塔面板方式：
#     1. 宝塔 → 网站 → 添加站点 → 填写域名
#     2. 网站目录 → 运行目录 → 设为 /public
#     3. 网站目录 → 根目录 → 设为 {{DEPLOY_PATH}}/shopxo-backend
#     4. 伪静态 → 选择 thinkphp 或粘贴下方 rewrite 规则
#     5. 配置文件 → 将本文件内容粘贴到 server { } 块内
#     6. SSL → 申请 Let's Encrypt 或上传证书
#
#   手动方式：
#     1. cp nginx.production.example.conf /etc/nginx/sites-available/yunxi.conf
#     2. 替换所有 {{...}} 占位符为实际值
#     3. nginx -t && systemctl reload nginx
#
# 【占位符说明】
#   {{API_DOMAIN}}     → 后端 API 域名，如 api.yunxi.com
#   {{DEPLOY_PATH}}    → 服务器部署目录，如 /www/wwwroot/yunxi-api
#   {{SSL_CERT_PATH}}  → SSL 证书目录（宝塔通常为 /www/server/panel/vhost/cert）
#
# ⚠️ 本文件包含占位符，不可直接使用！必须替换后再部署。
# ⚠️ 不要将真实证书路径或域名提交到 Git！
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name {{API_DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name {{API_DOMAIN}};

    # --- SSL 证书 ---
    # 宝塔方式：宝塔 → 网站 → SSL → 申请/上传证书
    # 手动方式：替换下方路径
    ssl_certificate     {{SSL_CERT_PATH}}/{{API_DOMAIN}}.pem;
    ssl_certificate_key {{SSL_CERT_PATH}}/{{API_DOMAIN}}.key;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- 网站根目录 ---
    # root 指向 shopxo-backend，运行目录（宝塔"运行目录"）设为 /public
    # 宝塔配置：网站目录 → 根目录 = {{DEPLOY_PATH}}/shopxo-backend，运行目录 = /public
    # 手动配置：root 直接指向 public
    root {{DEPLOY_PATH}}/shopxo-backend/public;
    index index.php index.html;

    # --- 主路由（ThinkPHP 伪静态） ---
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    # --- PHP-FPM ---
    # 宝塔方式：使用宝塔生成的 fastcgi_pass（通常为 unix socket）
    #   宝塔 PHP 8.1 的 socket 路径通常为：/tmp/php-cgi-81.sock
    #   可在宝塔 → 软件商店 → PHP 8.1 → 配置修改 中确认
    #   或在网站配置文件中查看宝塔自动生成的 fastcgi_pass
    # 手动方式：根据 PHP-FPM 配置调整
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-81.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- 禁止访问 .env / .git 等敏感文件 ---
    location ~ /\.(env|git) {
        deny all;
    }

    # --- 禁止访问隐藏文件（如 .htaccess、.svn） ---
    location ~ /\. {
        deny all;
    }

    # --- 禁止访问 runtime 目录（日志/缓存） ---
    location ~* ^/runtime/ {
        deny all;
    }

    # --- 禁止访问 vendor 目录（PHP 依赖） ---
    location ~* ^/vendor/ {
        deny all;
    }

    # --- 禁止访问 app 目录（应用源码） ---
    location ~* ^/app/ {
        deny all;
    }

    # --- 禁止访问 config 目录（配置文件） ---
    location ~* ^/config/ {
        deny all;
    }

    # --- 禁止访问 SQL 文件 ---
    location ~* \.sql$ {
        deny all;
    }

    # --- 禁止访问 composer 文件 ---
    location ~ /composer\.(json|lock) {
        deny all;
    }

    # --- 禁止访问 install.php 和 /install/ 目录（安装完成后必须删除） ---
    location ~* /install\.php$ {
        deny all;
    }
    location ~* ^/install/ {
        deny all;
    }

    # --- 上传目录禁止执行 PHP ---
    # 防止上传恶意 PHP 文件被执行
    location ~* ^/(static/upload|download)/.*\.(php|php5|phtml)$ {
        deny all;
    }

    # --- 上传文件大小限制 ---
    client_max_body_size 50m;

    # --- 安全响应头 ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- 日志（含 token 脱敏建议） ---
    # [MUYING-二开] 安全建议：生产环境不记录 query_string（含 token），或使用 map 过滤 token 参数
    #
    # 方案一（推荐）：定义不记录 query_string 的日志格式
    #   log_format no_query '$remote_addr - $remote_user [$time_local] '
    #                       '"$request_method $uri HTTP/$server_protocol" '
    #                       '$status $body_bytes_sent "$http_referer" '
    #                       '"$http_user_agent" "$http_x_forwarded_for"';
    #   access_log /www/wwwlogs/yunxi_access.log no_query;
    #
    # 方案二：保留 query_string 但过滤 token 参数
    #   map $request_uri $safe_uri {
    #       "~^(.*)[?&]token=[^&]*(.*)$" "$1$2";
    #       default "$request_uri";
    #   }
    #   log_format token_safe '$remote_addr - $remote_user [$time_local] '
    #                         '"$request_method $safe_uri" ...';
    #
    # 宝塔方式：日志路径通常为 /www/wwwlogs/
    access_log /www/wwwlogs/yunxi_access.log;
    error_log  /www/wwwlogs/yunxi_error.log;

    # --- 禁止访问 config 目录（二级防护，root 已指向 public 所以 config 不在文档树内） ---
    location ~* ^/config/ {
        deny all;
    }
}
