# ============================================================
# 禧孕小程序 — Nginx 生产环境配置示例（宝塔适配版）
# ============================================================
#
# ⚠️ 本文件分为两个独立片段，不可混用：
#
#   【Part A — http {} 上下文】→ 放入 Nginx 主配置文件 nginx.conf 的 http {} 块内
#                              （宝塔：软件商店 → Nginx → 配置修改 → http {} 内粘贴）
#   【Part B — server {} 上下文】→ 粘贴到宝塔网站配置的 server {} 块内
#                              （宝塔：网站 → 设置 → 配置文件）
#
# 【宝塔部署步骤】
#   1. 宝塔 → 网站 → 添加站点 → 填写域名
#   2. 网站目录 → 运行目录 → 设为 /public
#   3. 网站目录 → 根目录 → 设为 {{DEPLOY_PATH}}/shopxo-backend
#   4. 伪静态 → 选择 thinkphp
#   5. Part A → 宝塔 → 软件商店 → Nginx → 配置修改 → http {} 内粘贴
#   6. Part B → 网站 → 设置 → 配置文件 → server {} 内粘贴
#   7. SSL → 申请 Let's Encrypt 或上传证书
#   8. 终端执行 nginx -t 检查语法，确认无误后重载
#
# 【如果不能修改 http {} 上下文（共享服务器等限制）】
#   删除 Part A，将 Part B 中的 access_log 改为：
#     access_log off;
#   这样完全关闭 access_log 避免 query string 泄漏。
#
# 【占位符说明】
#   {{API_DOMAIN}}     → 后端 API 域名，如 api.yunxi.com
#   {{DEPLOY_PATH}}    → 服务器部署目录，如 /www/wwwroot/yunxi-api
#   {{SSL_CERT_PATH}}  → SSL 证书目录（宝塔通常为 /www/server/panel/vhost/cert）
#
# ⚠️ 本文件包含占位符，不可直接使用！必须替换后再部署。
# ⚠️ 不要将真实证书路径或域名提交到 Git！
# ⚠️ 部署后务必执行 nginx -t 验证语法！
# ============================================================


# ============================================================
# Part A — http {} 上下文（放入 nginx.conf 的 http {} 块内）
# ============================================================
#
# [MUYING-二开] 日志安全：定义不记录 query string 的日志格式
# 必须放在 http {} 内，不可放在 server {} 内
# 如果无法修改 http {} 上下文，请删除此段，将 Part B 的 access_log 改为 access_log off;
#
# 泄露风险说明：
#   微信小程序 API 请求的 query string 中曾包含 token / referrer / uuid 等敏感参数
#   Nginx access_log 一旦被拖库/备份泄露，攻击者可伪造任意用户身份
#   $uri 仅记录路径（不含 ? 后的参数），防止 token 等隐私数据出现在日志中

log_format no_query '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';


# ============================================================
# Part B — server {} 上下文（粘贴到宝塔网站配置的 server {} 块内）
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name {{API_DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name {{API_DOMAIN}};

    # --- SSL 证书 ---
    # 宝塔方式：宝塔 → 网站 → SSL → 申请/上传证书
    # 手动方式：替换下方路径
    ssl_certificate     {{SSL_CERT_PATH}}/{{API_DOMAIN}}.pem;
    ssl_certificate_key {{SSL_CERT_PATH}}/{{API_DOMAIN}}.key;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- 网站根目录 ---
    # root 指向 shopxo-backend，运行目录（宝塔"运行目录"）设为 /public
    # 宝塔配置：网站目录 → 根目录 = {{DEPLOY_PATH}}/shopxo-backend，运行目录 = /public
    # 手动配置：root 直接指向 public
    root {{DEPLOY_PATH}}/shopxo-backend/public;
    index index.php index.html;

    # --- 主路由（ThinkPHP 伪静态） ---
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    # --- PHP-FPM ---
    # 宝塔方式：使用宝塔生成的 fastcgi_pass（通常为 unix socket）
    #   宝塔 PHP 8.1 的 socket 路径通常为：/tmp/php-cgi-81.sock
    #   可在宝塔 → 软件商店 → PHP 8.1 → 配置修改 中确认
    #   或在网站配置文件中查看宝塔自动生成的 fastcgi_pass
    # 手动方式：根据 PHP-FPM 配置调整
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-81.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- 禁止访问 .env / .git 等敏感文件 ---
    location ~ /\.(env|git) {
        deny all;
    }

    # --- 禁止访问隐藏文件（如 .htaccess、.svn） ---
    location ~ /\. {
        deny all;
    }

    # --- 禁止访问 runtime 目录（日志/缓存） ---
    location ~* ^/runtime/ {
        deny all;
    }

    # --- 禁止访问 vendor 目录（PHP 依赖） ---
    location ~* ^/vendor/ {
        deny all;
    }

    # --- 禁止访问 app 目录（应用源码） ---
    location ~* ^/app/ {
        deny all;
    }

    # --- 禁止访问 config 目录（配置文件） ---
    location ~* ^/config/ {
        deny all;
    }

    # --- 禁止访问 SQL 文件 ---
    location ~* \.sql$ {
        deny all;
    }

    # --- 禁止访问 composer 文件 ---
    location ~ /composer\.(json|lock) {
        deny all;
    }

    # --- 禁止访问 install.php 和 /install/ 目录（安装完成后必须删除） ---
    location ~* /install\.php$ {
        deny all;
    }
    location ~* ^/install/ {
        deny all;
    }

    # --- 上传目录禁止执行 PHP ---
    # 防止上传恶意 PHP 文件被执行
    location ~* ^/(static/upload|download)/.*\.(php|php5|phtml)$ {
        deny all;
    }

    # --- 上传文件大小限制 ---
    client_max_body_size 50m;

    # --- 安全响应头 ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- 日志（使用 Part A 中定义的 no_query 格式，不记录 query string） ---
    # 必须先部署 Part A 的 log_format no_query，否则此处 nginx -t 会失败
    # 如果无法部署 Part A，请将此行改为 access_log off;
    access_log /www/wwwlogs/yunxi_access.log no_query;
    error_log  /www/wwwlogs/yunxi_error.log;
}
