# ============================================================
# 孕禧小程序 — Nginx 生产环境配置示例
# ============================================================
#
# 【用法】
#   1. 复制本文件: cp nginx.production.example.conf /etc/nginx/sites-available/yunxi.conf
#   2. 替换所有 {{...}} 占位符为实际值
#   3. 检查语法: nginx -t
#   4. 启用配置: ln -s /etc/nginx/sites-available/yunxi.conf /etc/nginx/sites-enabled/
#   5. 重载: systemctl reload nginx
#
# 【占位符说明】
#   {{API_DOMAIN}}     → 后端 API 域名，如 api.yunxi.com
#   {{DEPLOY_PATH}}    → 服务器部署目录，如 /data/www/yunxi
#   {{SSL_CERT_PATH}}  → SSL 证书目录，如 /etc/nginx/ssl
#
# ⚠️ 本文件包含占位符，不可直接使用！必须替换后再部署。
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name {{API_DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name {{API_DOMAIN}};

    # --- SSL 证书 ---
    ssl_certificate     {{SSL_CERT_PATH}}/{{API_DOMAIN}}.pem;
    ssl_certificate_key {{SSL_CERT_PATH}}/{{API_DOMAIN}}.key;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- 网站根目录 ---
    # ShopXO 标准部署：root 指向项目根目录（非 public/）
    # 根目录入口文件(adminwlmqhs.php/api.php/index.php)设置了 IS_ROOT_ACCESS=true
    root {{DEPLOY_PATH}}/yunxi/shopxo-backend;
    index index.php index.html;

    # --- 主路由（ThinkPHP rewrite） ---
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- 禁止访问敏感目录（root为项目根目录时生效） ---
    location ~ ^/(runtime|config|app|extend|vendor|rsakeys)/ {
        deny all;
    }

    # --- 禁止访问隐藏文件 ---
    location ~ /\. {
        deny all;
    }

    # --- 上传文件大小限制 ---
    client_max_body_size 20m;

    # --- 日志 ---
    access_log /var/log/nginx/yunxi_access.log;
    error_log  /var/log/nginx/yunxi_error.log;
}
