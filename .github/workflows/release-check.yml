name: Release Gate Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pw
          MYSQL_DATABASE: baby_mall_test
          MYSQL_USER: baby_mall
          MYSQL_PASSWORD: test_pw_123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://baby_mall:test_pw_123@127.0.0.1:3306/baby_mall_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      VITE_API_BASE_URL: https://example.invalid/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @baby-mall/api prisma:generate

      - name: Build Mini Program
        run: pnpm build:mini

      - name: Run Release Gate Check
        run: bash deploy/scripts/release-check.sh
