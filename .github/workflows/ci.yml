name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.13.0]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
          standalone: true

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @baby-mall/shared build

      - name: Prisma validate
        run: pnpm --filter @baby-mall/api prisma:validate

      - name: Generate Prisma Client
        run: pnpm --filter @baby-mall/api prisma:generate

      - name: Run API tests (unit + e2e)
        run: pnpm --filter @baby-mall/api test:ci

      - name: Build API
        run: pnpm build:api

      - name: Build Admin Web
        run: pnpm build:admin

      - name: Build Miniprogram
        run: VITE_API_BASE_URL=https://example.invalid/api pnpm build:mini

      - name: Release Gate Check (non-strict)
        run: pnpm release:check
